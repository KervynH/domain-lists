name: Update china streaming domain list

on:
  schedule:
    - cron: '0 19 * * *' # 每天 UTC 19:00 = 北京时间次日 03:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build domain list
        run: bash scripts/build-china-streaming-domains.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/china-streaming-domains.list
          if git diff --cached --quiet; then
            echo "无变化,跳过提交"
            exit 0
          fi
          git commit -m "chore: update china streaming domain list ($(date -u +%Y-%m-%d))"
          git push
